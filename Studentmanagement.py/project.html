<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

    <div class="background"></div>

    <div class="container">

        <h1>Student Management System</h1>

        <div class="stats">
            <div class="card">
                <h2>Total Students</h2>
                <p id="count">0</p>
            </div>
        </div>

        <!-- Add Student -->
        <div class="section">
            <h2>Add Student</h2>

            <input type="text" placeholder="Student Name">
            <input type="text" placeholder="Class">
            <input type="text" placeholder="Roll Number">
            <input type="text" placeholder="Address">

            <button>Add Student</button>
        </div>

        <!-- Search Student -->
        <div class="section">
            <h2>Search Student</h2>

            <input type="text" placeholder="Enter Roll Number">

            <button>Search</button>
        </div>

        <!-- Update Student -->
        <div class="section">
            <h2>Update Student</h2>

            <input type="text" placeholder="Roll Number">

            <button>Update Name</button>
            <button>Update Class</button>
            <button>Update Roll No</button>
            <button>Update Address</button>
        </div>

        <!-- Delete Student -->
        <div class="section">
            <h2>Delete Student</h2>

            <input type="text" placeholder="Roll Number">

            <button class="danger">Delete Student</button>
        </div>

        <!-- Student Table -->
        <div class="section">
            <h2>Student Records</h2>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Roll No</th>
                        <th>Address</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>John</td>
                        <td>12</td>
                        <td>101</td>
                        <td>New York</td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</body>

</html>
