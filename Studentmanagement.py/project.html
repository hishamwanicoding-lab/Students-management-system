<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>Student Management System</h1>
            <p>Manage students efficiently and easily</p>
        </header>

        <!-- Add Student -->
        <section class="card">
            <h2>Add Student</h2>
            <form>
                <input type="text" placeholder="Name">
                <input type="text" placeholder="Class">
                <input type="text" placeholder="Roll No">
                <input type="text" placeholder="Address">
                <button type="submit">Add Student</button>
            </form>
        </section>

        <!-- Search Student -->
        <section class="card">
            <h2>Search Student</h2>
            <form>
                <input type="text" placeholder="Enter Roll No">
                <button type="submit">Search</button>
            </form>
        </section>

        <!-- UPDATE SECTION (BUTTON STYLE) -->
        <section class="card">
            <h2>Update Student</h2>

            <input type="text" placeholder="Enter Roll No">

            <div class="button-grid">

                <button class="update-btn">Update Name</button>
                <button class="update-btn">Update Class</button>
                <button class="update-btn">Update Address</button>
                <button class="update-btn danger-btn">Update Roll No</button>

            </div>

            <input type="text" placeholder="Enter New Value">

        </section>

        <!-- Delete Student -->
        <section class="card danger">
            <h2>Delete Student</h2>
            <form>
                <input type="text" placeholder="Enter Roll No">
                <button type="submit">Delete</button>
            </form>
        </section>

        <!-- Table -->
        <section class="card">
            <h2>Student Records</h2>

            <table>
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Address</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>101</td>
                        <td>John</td>
                        <td>10th</td>
                        <td>Delhi</td>
                    </tr>
                </tbody>

            </table>
        </section>

    </div>

</body>

</html>
